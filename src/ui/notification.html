<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; pointer-events: none; }
    body {
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .popup {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 8px;
      padding: 14px 18px;
      background: linear-gradient(135deg, #242424 0%, #2e2e2e 100%);
      border: 1px solid #fd3737;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 20px rgba(240,192,64,0.15);
      animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
      position: relative;
    }
    .popup.closing {
      animation: slideOut 0.4s cubic-bezier(0.55, 0, 1, 0.45) forwards;
    }
    .fallback-icon {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      background: linear-gradient(135deg, #242424, #2e2e2e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }
    .icon-img {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      display: none;
    }
    .text { flex: 1; overflow: hidden; }
    .label {
      font-size: 10px;
      font-weight: 700;
      color: #fd3737;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 3px;
    }
    .name {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .desc {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .progress-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 0 0 12px 12px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #fd3737;
      animation: drain 5s linear forwards;
    }
    @keyframes slideIn {
      from { transform: translateX(110%); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOut {
      from { transform: translateX(0); opacity: 1; }
      to   { transform: translateX(110%); opacity: 0; }
    }
    @keyframes drain {
      from { width: 100%; }
      to   { width: 0%; }
    }
  </style>
</head>
<body>
  <div class="popup" id="popup">
    <div class="fallback-icon" id="fallback">🏆</div>
    <img class="icon-img" id="icon" alt="icon"/>
    <div class="text">
      <div class="label">Achievement Unlocked</div>
      <div class="name" id="name">...</div>
      <div class="desc" id="desc">...</div>
    </div>
    <div class="progress-bar">
      <div class="progress-bar-fill"></div>
    </div>
  </div>
  <script>
    function closePopup() {
      const popup = document.getElementById('popup')
      popup.classList.add('closing')
      popup.addEventListener('animationend', () => window.close(), { once: true })
    }

    window.notif.onAchievementUnlocked((achievement) => {
      document.getElementById('name').textContent = achievement.name || 'Achievement Name'
      document.getElementById('desc').textContent = achievement.description || 'Achievement description'
      
      const duration = achievement.duration || 5000
      const fill = document.querySelector('.progress-bar-fill')
      fill.style.animationDuration = (duration / 1000) + 's'

      setTimeout(closePopup, duration - 400)

      if (achievement.height) {
        document.getElementById('popup').style.height = (achievement.height -16) + 'px'
      }

      if (achievement.icon) {
        const img = document.getElementById('icon')
        img.src = achievement.icon
        img.onload = () => {
          document.getElementById('fallback').style.display = 'none'
          img.style.display = 'block'
        }
      }
      const audio = document.getElementById('sound')
      audio.volume = achievement.volume ?? .5
      audio.play()
    })

  </script>
</body>
<audio id="sound" src="../../sounds/psSound.mp3" preload="auto"></audio>
</html>
