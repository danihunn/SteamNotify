<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="./style.css" />
    <meta
      charset="UTF-8"
      http-equiv="Content-Security-Policy"
      content="
            default-src 'self';
            script-src 'self';
            style-src 'self';
            img-src 'self' data: ;
            connect-src 'self';
            font-src 'self';
            "
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SteamNotify</title>
  </head>

  <body>
    <div class="main-box">
      <h1 class="title-card">SteamNotify</h1>
      <button id="quit-button" class="quit-button">
        <img src="../../img/closeButton.png" alt="quit button" />
      </button>
      <button id="test-button" class="button-style testNotification">
        Test
      </button>
      <button class="settings-button">
        <img src="../../img/settings.png" alt="settings button" />
      </button>
      <button id="tray-button" class="tray-button">
        <img src="../../img/minus.png" alt="minimize">
      </button>
      <div class="volume-control">
        <label for="volume-slider">Volume</label>
        <input type="range" id="volume-slider" min="0" max="100" value="100" />
      </div>
    </div>

    <div class="settings-panel">
      <div class="setting-row">
        <label>Position</label>
        <select id="corner-select" class="setting-select">
          <option value="bottom-right">Bottom Right</option>
          <option value="bottom-left">Bottom Left</option>
          <option value="top-right">Top Right</option>
          <option value="top-left">Top Left</option>
          <option value="middle-right" selected>Middle Right</option>
          <option value="middle-left">Middle Left</option>
        </select>
      </div>

      <div class="setting-row">
        <label>Duration</label>
        <input
          type="range"
          id="duration-slider"
          min="1000"
          max="15000"
          step="500"
          value="15000"
        />
        <span id="duration-value">15s</span>
      </div>
